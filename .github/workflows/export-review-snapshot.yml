name: Export review snapshot

on:
  push:
    branches: [agent/rc5-friction-reset]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: repository-snapshot
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
