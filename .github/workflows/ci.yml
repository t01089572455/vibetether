name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - run: npm run test:coverage
      - run: npm run test:compat:v063-live
        env:
          VIBETETHER_REQUIRE_LIVE_V063: '1'
          VIBETETHER_LIVE_V063_ARTIFACT_DIR: ${{ runner.temp }}/vibetether-live-v063
      - name: Preserve live v0.6.3 failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-v063-${{ matrix.os }}-node${{ matrix.node }}
          path: ${{ runner.temp }}/vibetether-live-v063
          if-no-files-found: ignore
      - run: node scripts/test-package-journey.mjs
      - run: npm pack --dry-run
      - run: npm audit --audit-level=low
